version: '3'

services:
  shopi_api:
    build:
      context: .
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env 
    depends_on:
      - db
      - redis  
    volumes:
      - .:/app

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest 
    volumes:
      - redis_data:/data

  celery-worker:
    build:
      context: .
    command: sh -c "celery -A shopi_api worker --loglevel=WARNING"
    env_file:
      - .env 
    depends_on:
      - redis  
    volumes:
      - .:/app

  celery-beat:
    build:
      context: .
    command: sh -c "celery -A shopi_api beat --loglevel=WARNING"
    env_file:
      - .env 
    depends_on:
      - redis  
    volumes:
      - .:/app

  celery-flower:
    build:
      context: .
    command: sh -c "celery -A shopi_api flower --port=5555"
    env_file:
      - .env 
    ports:
      - "5556:5555"    
    depends_on:
      - redis  
    volumes:
      - .:/app

volumes:
  db_data: 
  redis_data: